[start]
command:/usr/local/etc/rc.d/cloudflared start
parameters:
type:script
message:Starting Cloudflare Tunnel service

[stop]
command:/usr/local/etc/rc.d/cloudflared stop
parameters:
type:script
message:Stopping Cloudflare Tunnel service

[restart]
command:/usr/local/etc/rc.d/cloudflared restart
parameters:
type:script
message:Restarting Cloudflare Tunnel service
description:Restart Cloudflare Tunnel service

[status]
command:/usr/local/etc/rc.d/cloudflared status
errors:no
parameters:
type:script_output
message:Requesting Cloudflare Tunnel status

[recover]
command:/usr/local/etc/rc.d/cloudflared status || /usr/local/etc/rc.d/cloudflared start
parameters:
type:script
message:Recovering Cloudflare Tunnel
description:Recover Cloudflare Tunnel (start if not running)
