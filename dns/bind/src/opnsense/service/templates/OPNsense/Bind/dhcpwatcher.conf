{% if helpers.exists('OPNsense.bind.general.enabled') and OPNsense.bind.general.enabled == '1' %}
[global]
nsupdate_address = 127.0.0.1
nsupdate_port = {{ OPNsense.bind.general.port }}

[reverse-zones]
{% if helpers.exists('OPNsense.bind.domain.domains.domain') %}
{%   for reverse_domain in helpers.toList('OPNsense.bind.domain.domains.domain') if reverse_domain.enabled == '1' and reverse_domain.type == 'reverse' and reverse_domain.source_subnet is defined and reverse_domain.source_subnet != '' %}
{{ reverse_domain.source_subnet }} = {{ reverse_domain.domainname }}
{%   endfor %}
{% endif %}

{% if helpers.exists('OPNsense.bind.watcher.mappings.mapping') %}
{%   for w in helpers.toList('OPNsense.bind.watcher.mappings.mapping') if w.enabled == '1' %}
{%     set tsig = helpers.getUUID(w.tsigkey) %}
{%     set domain = helpers.getUUID(w.hostname_suffix) %}
{%     set reverse = helpers.getUUID(w.reverse_zone) %}
{%     set lease_scopes = [] %}
{%     if domain and domain.domainname is defined %}
{%       if w.dhcp_source == 'isc-dhcp' and not helpers.empty('dhcpd') %}
{%         for interface, dhcpd in dhcpd.items() if dhcpd.enable|default('0') == '1' %}
{%           if 'range' in dhcpd and dhcpd.domain|default('')|lower == domain.domainname|lower %}
{%             do lease_scopes.append(dhcpd.range.from + '-' + dhcpd.range.to) %}
{%           endif %}
{%           if 'pool' in dhcpd %}
{%             for pool in helpers.toList('dhcpd.' + interface + '.pool') if 'range' in pool and pool.domain|default(dhcpd.domain)|lower == domain.domainname|lower %}
{%               do lease_scopes.append(pool.range.from + '-' + pool.range.to) %}
{%             endfor %}
{%           endif %}
{%         endfor %}
{%       elif w.dhcp_source == 'kea-dhcp4' and helpers.exists('OPNsense.Kea.dhcp4.subnets.subnet4') and OPNsense.Kea.dhcp4.general.enabled == '1' %}
{%         for subnet in helpers.toList('OPNsense.Kea.dhcp4.subnets.subnet4') if subnet.subnet|default('') != '' and subnet.option_data.domain_name|default(OPNsense.system.domain, true)|lower == domain.domainname|lower %}
{%           do lease_scopes.append(subnet.subnet) %}
{%         endfor %}
{%       elif w.dhcp_source == 'kea-dhcp6' and helpers.exists('OPNsense.Kea.dhcp6.subnets.subnet6') and OPNsense.Kea.dhcp6.general.enabled == '1' %}
{%         for subnet in helpers.toList('OPNsense.Kea.dhcp6.subnets.subnet6') if subnet.subnet|default('') != '' and domain.domainname|lower in (subnet.option_data.domain_search|default('', true)|lower|replace(' ', '')).split(',') %}
{%           do lease_scopes.append(subnet.subnet) %}
{%         endfor %}
{%       endif %}
{%     endif %}
{%     if tsig and tsig.enabled == '1' and domain and lease_scopes %}
[{{ w['@uuid'] }}]
dhcp_source = {{ w.dhcp_source }}
lease_scopes = {{ lease_scopes|join(',') }}
hostname_suffix = {{ domain.domainname }}
{%       if reverse and reverse.enabled == '1' and reverse.type == 'reverse' %}
reverse_zone = {{ reverse.domainname }}
{%       endif %}
tsigkey_name = {{ tsig.name }}
tsigkey_algo = {{ tsig.algorithm }}
tsigkey_secret = {{ tsig.secret }}
{%     endif %}
{%   endfor %}
{% endif %}
{% endif %}
