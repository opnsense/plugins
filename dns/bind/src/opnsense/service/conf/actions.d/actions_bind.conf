[start]
command:/usr/local/opnsense/scripts/OPNsense/Bind/bindStart.sh
parameters:
type:script
message:starting BIND

[stop]
command:/usr/local/opnsense/scripts/OPNsense/Bind/bindStop.sh
parameters:
type:script
message:stopping BIND

[restart]
command:/usr/local/etc/rc.d/named restart
parameters:
type:script
message:restarting BIND

[status]
command:/usr/local/etc/rc.d/named status; exit 0
parameters:
type:script_output
message:request BIND status

[reload]
command:/usr/local/etc/rc.d/named reload
parameters:
type:script
message:request BIND reload

[dnsbl]
command:/usr/local/opnsense/scripts/OPNsense/Bind/dnsblRefresh.sh
parameters: %s
type:script
message:fetching DNSBLs

[dnsblapply]
command:/usr/local/opnsense/scripts/OPNsense/Bind/dnsblApply.sh
parameters: %s
type:script
message:applying DNSBLs and restarting BIND

[dnsblcron]
command:/usr/local/opnsense/scripts/OPNsense/Bind/dnsblRefresh.sh
parameters:
type:script
message:fetching DNSBLs, reloading blacklist zone, and flushing cache
description:Update BIND DNSBLs

[zone.check]
command:/usr/local/opnsense/scripts/OPNsense/Bind/zoneCheck.sh
parameters: %s
type:script_output

[zone.show]
command:/usr/local/opnsense/scripts/OPNsense/Bind/zoneShow.py
parameters: %s
type:script_output

[dhcpwatcher]
command:/usr/local/opnsense/scripts/OPNsense/Bind/dhcpwatcherStart.sh
parameters:
type:script
message:starting BIND DHCP lease watcher
